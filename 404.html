<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found | SolarPedia</title>

<meta name="description" content="The page you are looking for could not be found.">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/pages.css">
<link rel="stylesheet" href="css/responsive.css">

<style>

.error-page{
    min-height:70vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:60px 20px;
}

.error-box{
    max-width:700px;
}

.error-box h1{
    font-size:120px;
    color:#198754;
    margin:0;
}

.error-box h2{
    font-size:36px;
    margin:20px 0;
}

.error-box p{
    color:#666;
    line-height:1.8;
    margin-bottom:35px;
}

.home-btn{
    display:inline-block;
    background:#198754;
    color:#fff;
    text-decoration:none;
    padding:15px 35px;
    border-radius:8px;
    transition:.3s;
}

.home-btn:hover{
    background:#157347;
}

</style>

</head>

<body>

<section class="error-page">

<div class="error-box">

<h1>404</h1>

<h2>Oops! Page Not Found</h2>

<p>
The page you're looking for doesn't exist or may have been moved.
</p>

<a href="index.html" class="home-btn">
🏠 Back to Home
</a>

</div>

</section>
<button id="backToTop" title="Back to Top">
    ↑
</button>
</body>

</html>
